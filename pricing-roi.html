    :root {

      --ink:      #111110;
      --mid:      #5A5750;
      --dim:      #9E9B96;
      --line:     #E8E5E0;
      --bg:       #FAFAF8;
      --white:    #FFFFFF;
      --nav-h:    56px;
      --r:        10px;
    }
    html { scroll-behavior: smooth; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--white); color: var(--ink);
      line-height: 1.6; -webkit-font-smoothing: antialiased;
    }

    /* ── Top nav ── */
    .topnav {
      position: sticky; top: 0; z-index: 60;
      height: var(--nav-h);
      background: var(--ink);
      display: flex; align-items: center;
      padding: 0 40px; gap: 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .tn-logo {
      display: flex; align-items: center; gap: 9px;
      text-decoration: none; margin-right: 28px; flex-shrink: 0;
    }
    .tn-logo-name { font-size: 16px; font-weight: 800; letter-spacing: -.4px; color: #fff; }
    .tn-links {
      display: flex; align-items: center; gap: 2px; flex: 1; overflow: hidden;
    }
    .tn-links a {
      font-size: 12px; font-weight: 500; color: rgba(255,255,255,.42);
      text-decoration: none; padding: 6px 9px; border-radius: 6px; white-space: nowrap;
      transition: color .12s, background .12s;
    }
    .tn-links a:hover { color: rgba(255,255,255,.88); background: rgba(255,255,255,.07); }
    .tn-links a.active { color: rgba(255,255,255,.88); }
    .tn-cta { margin-left: 12px; flex-shrink: 0; }
    .tn-cta a {
      font-size: 12px; font-weight: 600; color: #fff;
      background: var(--orange); border-radius: var(--r);
      padding: 7px 16px; text-decoration: none; transition: background .12s;
    }
    .tn-cta a:hover { background: #D9580F; }

    /* ── Page layout ── */
    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 64px 64px 80px; }

    /* ── Typography ── */
    .label {
      display: inline-block; font-size: 10px; font-weight: 700;
      letter-spacing: .8px; text-transform: uppercase;
      color: var(--orange); margin-bottom: 16px;
    }
    .page-title {
      font-size: clamp(28px, 3.5vw, 38px); font-weight: 700;
      letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 10px;
    }
    .page-sub {
      font-size: 15px; color: var(--mid); line-height: 1.6; margin-bottom: 48px;
    }

    /* ── Section headings ── */
    .section-hd {
      font-size: 11px; font-weight: 700; letter-spacing: .7px;
      text-transform: uppercase; color: var(--dim);
      margin-bottom: 16px; margin-top: 48px;
    }
    .section-hd:first-of-type { margin-top: 0; }

    /* ── iframe wrapper ── */
    .embed-wrap {
      display: inline-block;
      border: 1px solid var(--line); border-radius: 12px;
      overflow: hidden; background: var(--white);
      box-shadow: 0 1px 6px rgba(0,0,0,.05);
    }
    .embed-wrap iframe {
      display: block; border: none;
    }

    /* ── Footer ── */
    .foot {
      background: var(--ink); padding: 22px 64px;
      border-top: 1px solid rgba(255,255,255,.05);
    }
    .foot-row {
      display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap; gap: 10px;
    }
    .foot-logo { display: flex; align-items: center; gap: 7px; text-decoration: none; }
    .foot-copy { font-size: 12px; color: rgba(255,255,255,.18); }
    .foot-links { display: flex; gap: 16px; }
    .foot-links a {
      font-size: 12px; color: rgba(255,255,255,.26);
      text-decoration: none; transition: color .12s;
    }
    .foot-links a:hover { color: rgba(255,255,255,.6); }

    @media (max-width: 768px) {
      .topnav { padding: 0 20px; }
      .tn-links a { font-size: 11px; padding: 6px 7px; }
      .page-wrap { padding: 40px 24px 60px; }
      .foot { padding: 20px 24px; }
    }
  </style>
</head>
